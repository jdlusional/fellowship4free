name: Deploy to GitHub Pages

# Publishes the static site (index.html, assets/, data/) to GitHub Pages
# whenever you push to main. This is what makes approved changes go live:
# you approve candidates, run approve_candidates.py to update data/, push,
# and this workflow redeploys the site.

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo root (index.html, assets/, data/ are all needed)
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
